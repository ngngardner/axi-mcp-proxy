repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-added-large-files
  - id: check-toml
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace

- repo: local
  hooks:
  - id: cargo-fmt
    name: cargo fmt
    entry: cargo fmt --all -- --check
    language: system
    pass_filenames: false

  - id: cargo-clippy
    name: cargo clippy
    entry: cargo clippy --all-targets -- -D warnings
    language: system
    pass_filenames: false

  - id: ast-grep
    name: ast-grep
    entry: ast-grep scan
    language: system
    pass_filenames: false
    types: [rust]

  - id: cargo-deny
    name: cargo deny
    entry: cargo deny check licenses bans sources
    language: system
    pass_filenames: false

  - id: cargo-test
    name: cargo test
    entry: cargo test
    language: system
    pass_filenames: false
    stages: [pre-push]
